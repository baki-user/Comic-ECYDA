<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="container">
        <div class="escenario1">
            <div class="escalador">
                <img class="candelabro" src="./assets/candelabro.svg" alt="">
                <img class="candelabro2" src="./assets/candelabro.svg" alt="">
                <img class="candelabro3" src="./assets/candelabro.svg" alt="">
                <img class="piano" src="./assets/piano.svg" alt="">
                <div id="mujer"></div>
                <div id="moso"></div>
                <img id="hoja" src="./assets/hoja1.svg" alt="">
                <img id="hojaCandelabros" src="./assets/hoja1.svg" alt="">
                <img id="hojaPiano" src="./assets/hoja1.svg" alt="">
                <img class="mesa" src="./assets/mesa.svg" alt="">
                <img class="mesa2" src="./assets/mesa.svg" alt="">
                <img class="mesa3" src="./assets/mesa.svg" alt="">
                <img id="imgAudio" src="./assets/globo.png" alt="">
            </div>
        </div>

    </div>
    <img class="home" src="./assets/home.svg" alt="">
    <img class="sonido" src="./assets/sonido.svg" alt="">
    <img class="izq" src="./assets/flecha izq.svg" alt="">
    <img class="der" src="./assets/flecha der.svg" alt="">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.13.0/lottie.min.js"></script>
    <script>
        const mujer = document.getElementById("mujer");
        const moso = document.getElementById("moso");
        const escenario = document.querySelector(".escenario1");
        const btnSonido = document.querySelector(".sonido");
        const imgAudio = document.getElementById("imgAudio");

        const anchoEscenarioReal = 4883;
        const escalaVisual = 0.5622;
        const anchoEscenarioVisual = anchoEscenarioReal * escalaVisual;
        const limiteEscenario = Math.max(0, Math.min(anchoEscenarioVisual - 1366, anchoEscenarioVisual));

        const Cmujer = lottie.loadAnimation({
            container: mujer,
            render: 'svg',
            loop: false,
            autoplay: false,
            path: 'after/mujer.json'
        });

        const Cmoso = lottie.loadAnimation({
            container: moso,
            render: 'svg',
            loop: true,
            autoplay: false,
            path: 'after/ciclo de caminado moso.json'
        });

        // Un solo audio
        const audio = new Audio('./assets/audio1.mp3');
        audio.loop = false;

        function mostrarImg() {
            imgAudio.style.opacity = "1";
        }

        function ocultarImg() {
            imgAudio.style.opacity = "0";
        }

        function intentarAutoplay() {
            audio.play()
                .then(() => mostrarImg())
                .catch(() => { });
            document.removeEventListener("click", intentarAutoplay);
            document.removeEventListener("touchstart", intentarAutoplay);
        }

        window.addEventListener("load", () => {
            audio.play()
                .then(() => mostrarImg())
                .catch(() => {
                    document.addEventListener("click", intentarAutoplay);
                    document.addEventListener("touchstart", intentarAutoplay);
                });
        });

        audio.addEventListener("pause", ocultarImg);
        audio.addEventListener("ended", ocultarImg);
        audio.addEventListener("play", mostrarImg);

        btnSonido.addEventListener("click", function () {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        function iniciarAnimacion() {
            Cmujer.stop();
            Cmujer.play();
            mujer.style.transition = "transform 10s ease";
            mujer.style.transform = "translateX(4000px)";

            Cmoso.stop();
            Cmoso.play();
            Cmoso.setSpeed(0.1, 5);
            moso.style.transition = "transform 10s ease";
            moso.style.transform = "translateX(4000px)";

            escenario.style.transition = "transform 10s ease";
            escenario.style.transform = `translateX(-${limiteEscenario}px)`;

            setTimeout(function () {
                Cmoso.stop();
                mujer.style.transition = "opacity 0.5s ease";
                mujer.style.opacity = "0";
                moso.style.transition = "opacity 0.5s ease";
                moso.style.opacity = "0";
            }, 9500);
        }

        document.getElementById("hoja").addEventListener("click", function () {
            audio.currentTime = 0;
            audio.play();
            mostrarImg();

            audio.addEventListener("ended", function manejadorFin() {
                iniciarAnimacion();
                audio.removeEventListener("ended", manejadorFin);
            });
        });
    </script>
    <script src="./animacion.js"></script>
    <script>
        document.querySelector(".der").addEventListener("click", () => {
            window.parent.postMessage("siguiente-escena", "*");
        });
        document.querySelector(".izq").addEventListener("click", () => {
            window.parent.postMessage("escena-anterior", "*");
        });
        function ajustarEscala() {
            const escalaX = window.innerWidth / 1366;
            const escalaY = window.innerHeight / 768;
            const escala = Math.min(escalaX, escalaY);
            document.documentElement.style.setProperty('--escala', escala);
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();
    </script>

</body>

</html>
